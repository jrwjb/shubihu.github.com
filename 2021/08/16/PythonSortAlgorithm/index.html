              <h2 id="Python常用排序算法"><a href="#Python常用排序算法" class="headerlink" title="Python常用排序算法"></a>Python常用排序算法</h2><a id="more"></a>
<h5 id="快速排序"><a href="#快速排序" class="headerlink" title="快速排序"></a>快速排序</h5><figure class="highlight angelscript"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br></pre></td><td class="code"><pre><code class="hljs angelscript">def quick_sort(<span class="hljs-built_in">array</span>):<br>    <span class="hljs-keyword">if</span> len(<span class="hljs-built_in">array</span>) &lt;= <span class="hljs-number">1</span>:  # 递归跳出条件<br>        <span class="hljs-keyword">return</span> <span class="hljs-built_in">array</span><br>    pivot = <span class="hljs-built_in">array</span>[<span class="hljs-number">0</span>]<br>    left = [i <span class="hljs-keyword">for</span> i <span class="hljs-keyword">in</span> <span class="hljs-built_in">array</span>[<span class="hljs-number">1</span>:] <span class="hljs-keyword">if</span> i &lt; pivot]<br>    right = [i <span class="hljs-keyword">for</span> i <span class="hljs-keyword">in</span> <span class="hljs-built_in">array</span>[<span class="hljs-number">1</span>:] <span class="hljs-keyword">if</span> i &gt;= pivot]<br>    <span class="hljs-keyword">return</span> quick_sort(left) + [pivot] + quick_sort(right)<br></code></pre></td></tr></table></figure>
<h5 id="冒泡排序"><a href="#冒泡排序" class="headerlink" title="冒泡排序"></a>冒泡排序</h5><figure class="highlight angelscript"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br></pre></td><td class="code"><pre><code class="hljs angelscript">def bubble_sort(<span class="hljs-built_in">array</span>):<br>    <span class="hljs-keyword">for</span> i <span class="hljs-keyword">in</span> range(len(<span class="hljs-built_in">array</span>) - <span class="hljs-number">1</span>):<br>        <span class="hljs-keyword">for</span> j <span class="hljs-keyword">in</span> range(len(<span class="hljs-built_in">array</span>) - i <span class="hljs-number">-1</span>): # 已排序好的部分不需再遍历<br>            <span class="hljs-keyword">if</span> <span class="hljs-built_in">array</span>[j] &gt; <span class="hljs-built_in">array</span>[j+<span class="hljs-number">1</span>]:<br>                <span class="hljs-built_in">array</span>[j], <span class="hljs-built_in">array</span>[j+<span class="hljs-number">1</span>] = <span class="hljs-built_in">array</span>[j+<span class="hljs-number">1</span>], <span class="hljs-built_in">array</span>[j]<br>    <span class="hljs-keyword">return</span> <span class="hljs-built_in">array</span><br></code></pre></td></tr></table></figure>
<h5 id="桶排"><a href="#桶排" class="headerlink" title="桶排"></a>桶排</h5><figure class="highlight nimrod"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br></pre></td><td class="code"><pre><code class="hljs nimrod">def bucker_sort(<span class="hljs-built_in">array</span>):<br>    <span class="hljs-literal">result</span> = []<br>    minVal, maxVal = min(<span class="hljs-built_in">array</span>), max(<span class="hljs-built_in">array</span>)<br>    bucket = [<span class="hljs-number">0</span>] * (maxVal - minVal + <span class="hljs-number">1</span>)  <span class="hljs-comment"># 所需的桶数</span><br>    <span class="hljs-keyword">for</span> i <span class="hljs-keyword">in</span> <span class="hljs-built_in">array</span>:<br>        bucket[i - minVal] += <span class="hljs-number">1</span>     <span class="hljs-comment"># 每个数字出现的次数</span><br>    <span class="hljs-keyword">for</span> i <span class="hljs-keyword">in</span> <span class="hljs-built_in">range</span>(len(bucket)):<br>        <span class="hljs-keyword">if</span> bucket[i]:<br>            <span class="hljs-literal">result</span> += [i + minVal] * bucket[i]<br>    <span class="hljs-keyword">return</span> <span class="hljs-literal">result</span><br></code></pre></td></tr></table></figure>
