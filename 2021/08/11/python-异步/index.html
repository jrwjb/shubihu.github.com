ine">61</span><br><span class="line">62</span><br><span class="line">63</span><br><span class="line">64</span><br><span class="line">65</span><br><span class="line">66</span><br><span class="line">67</span><br><span class="line">68</span><br><span class="line">69</span><br><span class="line">70</span><br><span class="line">71</span><br><span class="line">72</span><br><span class="line">73</span><br><span class="line">74</span><br><span class="line">75</span><br></pre></td><td class="code"><pre><span class="line">from urllib import request</span><br><span class="line">from urllib import parse</span><br><span class="line">from urllib.request import urlopen</span><br><span class="line">import json</span><br><span class="line">import pandas as pd</span><br><span class="line"># 用于多进程</span><br><span class="line">from multiprocessing import Process</span><br><span class="line"># 用于多线程</span><br><span class="line">from threading import Thread</span><br><span class="line"># 用于协程+异步</span><br><span class="line">import aiohttp</span><br><span class="line">import asyncio</span><br><span class="line">&quot;&quot;&quot;</span><br><span class="line">aiohttp:异步发送POST请求</span><br><span class="line">&quot;&quot;&quot;</span><br><span class="line">async def city_rule_asy():</span><br><span class="line">    data &#x3D; &#123;&quot;key&quot;: &quot;&quot;&#125;</span><br><span class="line">    myPostUrl &#x3D; &quot;http:&#x2F;&#x2F;api.chinadatapay.com&#x2F;government&#x2F;traffic&#x2F;2299&quot;</span><br><span class="line">    async with aiohttp.ClientSession() as session:</span><br><span class="line">        async with session.post(myPostUrl, data&#x3D;data) as res:</span><br><span class="line">            # print(res.status)</span><br><span class="line">            return json.loads(await res.text())</span><br><span class="line">def run():</span><br><span class="line">    tasks &#x3D; []</span><br><span class="line">    for i in range(5):</span><br><span class="line">        task &#x3D; asyncio.ensure_future(city_rule_asy())</span><br><span class="line">        tasks.append(task)</span><br><span class="line">    loop &#x3D; asyncio.get_event_loop()</span><br><span class="line">    result &#x3D; loop.run_until_complete(asyncio.gather(*tasks))</span><br><span class="line">    with open(&#39;city_rules.txt&#39;, &#39;a+&#39;) as fw:</span><br><span class="line">        for i in response[&#39;data&#39;]:</span><br><span class="line">           for j in i[&#39;cities&#39;]:</span><br><span class="line">                fw.write(f&quot;&#123;j[&#39;city&#39;]&#125;\t&#123;j[&#39;engine&#39;]&#125;\t&#123;j[&#39;prefix&#39;]&#125;\t&#123;j[&#39;vin&#39;]&#125;\t&#123;j[&#39;model&#39;]&#125;\n&quot;)</span><br><span class="line">#### &#x3D;&#x3D;&#x3D;&#x3D;&#x3D;&#x3D;&#x3D;&#x3D;&#x3D;&#x3D;&#x3D;&#x3D;&#x3D;&#x3D;&#x3D;&#x3D;&#x3D;&#x3D;&#x3D;&#x3D;&#x3D;&#x3D;&#x3D;&#x3D;&#x3D;&#x3D;&#x3D;&#x3D;&#x3D;&#x3D;&#x3D;&#x3D;&#x3D;&#x3D;&#x3D;&#x3D;&#x3D;&#x3D;&#x3D;&#x3D;&#x3D;&#x3D;&#x3D;&#x3D; ###</span><br><span class="line">def city_rule():</span><br><span class="line">    myPostUrl &#x3D; &quot;http:&#x2F;&#x2F;api.chinadatapay.com&#x2F;government&#x2F;traffic&#x2F;2299&quot;</span><br><span class="line">    data &#x3D; &#123;&quot;key&quot;: &quot;&quot;&#125;</span><br><span class="line">    params &#x3D; parse.urlencode(data).encode(&#39;utf-8&#39;)  # 提交类型不能为str，需要为byte类型</span><br><span class="line">    req &#x3D; request.Request(myPostUrl, params)</span><br><span class="line">    response &#x3D; json.loads(urlopen(req).read().decode())</span><br><span class="line">    with open(&#39;city_rules.txt&#39;, &#39;a+&#39;) as fw:</span><br><span class="line">        for i in response[&#39;data&#39;]:</span><br><span class="line">           for j in i[&#39;cities&#39;]:</span><br><span class="line">                fw.write(f&quot;&#123;j[&#39;city&#39;]&#125;\t&#123;j[&#39;engine&#39;]&#125;\t&#123;j[&#39;prefix&#39;]&#125;\t&#123;j[&#39;vin&#39;]&#125;\t&#123;j[&#39;model&#39;]&#125;\n&quot;)</span><br><span class="line">## 单进程单线程同步</span><br><span class="line">def single_process():</span><br><span class="line">    for i in range(5):</span><br><span class="line">        city_rule()</span><br><span class="line"># 多进程并行</span><br><span class="line">def mul_process():</span><br><span class="line">    processes &#x3D; []</span><br><span class="line">    for i in range(5):</span><br><span class="line">        p &#x3D; Process(target&#x3D;city_rule, args&#x3D;())     # 一个参数 args&#x3D;(prameter,)</span><br><span class="line">        processes.append(p)</span><br><span class="line">        p.start()</span><br><span class="line">    for p in processes:</span><br><span class="line">        p.join()</span><br><span class="line"># 多线程并发</span><br><span class="line">def mul_thead():</span><br><span class="line">    threads &#x3D; []</span><br><span class="line">    for i in range(5):</span><br><span class="line">        t &#x3D; Thread(target&#x3D;city_rule, args&#x3D;())</span><br><span class="line">        threads.append(t)</span><br><span class="line">        t.start()</span><br><span class="line">    for t in threads:</span><br><span class="line">        t.join()</span><br><span class="line">if __name__ &#x3D;&#x3D; &#39;__main__&#39;:</span><br><span class="line">    # 异步</span><br><span class="line">    run()</span><br><span class="line">    # 同步</span><br><span class="line">    single_process()</span><br><span class="line">    # 多进程</span><br><span class="line">    mul_process()</span><br><span class="line">    #多线程</span><br><span class="line">    mul_thead()</span><br></pre></td></tr></table></figure>
